name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment (beta|prod)'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ---------------------------------------------------------------------------
  # Build job - runs for all push and dispatch events
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Deploy to Beta - auto-deploys on push to main
  # Creates/updates a separate Worker named "cyberdeck-club-beta"
  # ---------------------------------------------------------------------------
  deploy-beta:
    name: Deploy to Beta
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'beta')
    environment:
      name: beta
      url: https://beta.cyberdeck.club

    steps:
      - name: Checkout (for wrangler.jsonc + migrations)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            wrangler.jsonc
            drizzle/migrations
          sparse-checkout-cone-mode: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # The Astro Cloudflare adapter generates dist/server/wrangler.json as a
      # flattened config that strips the `env` block from wrangler.jsonc.
      # Without this step, `wrangler deploy --env beta` falls back to the
      # top-level d1_databases binding (production DB) since no env.beta
      # overrides exist in the generated file.
      - name: Inject beta env overrides into generated wrangler config
        run: |
          node -e '
            const fs = require("fs");
            const text = fs.readFileSync("wrangler.jsonc", "utf8");
            let out = "", i = 0, inStr = false;
            while (i < text.length) {
              if (inStr) {
                if (text[i] === "\\" && i + 1 < text.length) { out += text[i] + text[i+1]; i += 2; continue; }
                if (text[i] === "\"") inStr = false;
                out += text[i++]; continue;
              }
              if (text[i] === "\"") { inStr = true; out += text[i++]; continue; }
              if (text[i] === "/" && text[i+1] === "/") { while (i < text.length && text[i] !== "\n") i++; continue; }
              if (text[i] === "/" && text[i+1] === "*") { i += 2; while (i < text.length && !(text[i] === "*" && text[i+1] === "/")) i++; i += 2; continue; }
              out += text[i++];
            }
            out = out.replace(/,\s*([\]}])/g, "$1");
            const src = JSON.parse(out);
            const gen = JSON.parse(fs.readFileSync("dist/server/wrangler.json", "utf8"));
            gen.env = src.env || {};
            fs.writeFileSync("dist/server/wrangler.json", JSON.stringify(gen, null, 2));
          '
          echo "✅ Injected env.beta overrides into dist/server/wrangler.json"
          echo "Beta D1 binding:"
          jq '.env.beta.d1_databases' dist/server/wrangler.json

      - name: Run D1 migrations (Beta)
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply cyberdeck-db-beta --env beta --remote

      # Deploys to a separate Worker named "cyberdeck-club-beta"
      # using the env.beta config from wrangler.jsonc.
      # Must use --config dist/server/wrangler.json because the Astro
      # Cloudflare adapter generates the correct main/assets config there.
      - name: Deploy to Cloudflare Workers (Beta)
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json --env beta

  # ---------------------------------------------------------------------------
  # Deploy to Production - manual dispatch only
  # Updates the main Worker named "cyberdeck-club"
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://cyberdeck.club

    steps:
      - name: Checkout (for wrangler.jsonc + migrations)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            wrangler.jsonc
            drizzle/migrations
          sparse-checkout-cone-mode: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run D1 migrations (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply cyberdeck-db --remote

      # Deploys to the main Worker named "cyberdeck-club"
      # using top-level config from wrangler.jsonc.
      # Must use --config dist/server/wrangler.json because the Astro
      # Cloudflare adapter generates the correct main/assets config there.
      - name: Deploy to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json
